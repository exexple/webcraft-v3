version: '3.9'

services:
  # ── API Gateway ────────────────────────────────────────────
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.dev
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - GATEWAY_PORT=4000
      - LEADS_SERVICE_URL=http://leads-service:4001
      - ANALYTICS_SERVICE_URL=http://analytics-service:4002
      - CMS_SERVICE_URL=http://cms-service:4003
    env_file:
      - ./infra/.env.local
    depends_on:
      - leads-service
      - analytics-service
      - cms-service
    volumes:
      - ./gateway/src:/app/src
    restart: unless-stopped

  # ── Leads Service ──────────────────────────────────────────
  leads-service:
    build:
      context: ./services/leads-service
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
      - LEADS_SERVICE_PORT=4001
    env_file:
      - ./infra/.env.local
    volumes:
      - ./services/leads-service/src:/app/src
    restart: unless-stopped

  # ── Analytics Service ──────────────────────────────────────
  analytics-service:
    build:
      context: ./services/analytics-service
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
      - ANALYTICS_SERVICE_PORT=4002
    env_file:
      - ./infra/.env.local
    volumes:
      - ./services/analytics-service/src:/app/src
    restart: unless-stopped

  # ── CMS Service ────────────────────────────────────────────
  cms-service:
    build:
      context: ./services/cms-service
      dockerfile: Dockerfile.dev
    environment:
      - NODE_ENV=development
      - CMS_SERVICE_PORT=4003
    env_file:
      - ./infra/.env.local
    volumes:
      - ./services/cms-service/src:/app/src
    restart: unless-stopped
